  base_url: "https://token-plan-cn.xiaomimimo.com/v1"
  api_key: "tp-c5fbolasp2e1oudhm6fz4niwuqzcakcg55w0xi5gi16ukyr5"
  temperature: 0.0
  max_tokens: 4096

vision_llm:
  provider: "openai"
  model: "mimo-v2.5"
  base_url: "https://token-plan-cn.xiaomimimo.com/v1"
  api_key: "tp-c5fbolasp2e1oudhm6fz4niwuqzcakcg55w0xi5gi16ukyr5"
  temperature: 0.0
  max_tokens: 4096

ollama:
  model: "gemma4"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 4096

embedding:
  provider: "bge"
  model: "bge-m3"
  dimensions: 1024
  model_path: "models/bge-m3"
  api_key: ""

splitter:
  strategy: "recursive"
  chunk_size: 1000
  chunk_overlap: 200
  separators: []          # 空列表使用默认分隔符，自定义示例: ["\n\n", "\n", "。", " "]
  keep_code_blocks: true  # 保护 Markdown 代码块不被切碎
  keep_headers: true      # 保护 Markdown 标题不与正文分离

vector_store:
  provider: "chroma"
  persist_directory: "data/db/chroma"

retrieval:
  top_k: 10
  hybrid: true

rerank:
  enabled: false
  provider: "none"
  model: ""
  top_k: 5

evaluation:
  backends: ["custom"]

observability:
  log_level: "INFO"
  traces_file: "logs/traces.jsonl"
